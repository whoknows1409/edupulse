apiVersion: batch/v1
kind: Job
metadata:
  name: edupulse-migrate
  namespace: edupulse
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: REPLACE_IMAGE
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: edupulse-config
            - secretRef:
                name: edupulse-secrets
